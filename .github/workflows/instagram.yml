name: Latest Instagram Posts
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme-with-instagram:
    name: Update README with Instagram
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Using RSSHub (No login required)
          feed_list: "https://rsshub.app/instagram/user/shutterquests"
          comment_tag_name: "INSTAGRAM"
          max_post_count: 4
          # This template ensures the images look sharp in a grid
          template: '<a href="$url" target="_blank"><img src="$img" width="200" height="200" style="object-fit: cover; border-radius: 10px; margin: 5px;" alt="$title" /></a>'
